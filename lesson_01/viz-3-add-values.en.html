<script>
(function () {
  var $ = function (id) { return document.getElementById(id); };
  var LINES = [
    { t: '%include "x86inc.asm"',
      e: "<b>Including x86inc.asm</b> — the \"header\" from the x264 / FFmpeg / dav1d communities. It provides everything we've been using: r0/r1 names instead of raw register names, m0/m1 instead of xmm0/xmm1, the cglobal and RET macros. Without it you get bare nasm, where all of this is manual." },
    { t: "" },
    { t: "SECTION .text",
      e: "<b>Code section.</b> Executable instructions live in .text. Constants (like our batch of tens [10×16] from part 1) go into a different section — .data. Lesson 3 shows this in practice." },
    { t: "" },
    { t: ";static void add_values(uint8_t *src, const uint8_t *src2)",
      e: "<b>Comment.</b> The semicolon \";\" in asm = \"//\" in C. The convention is to write the function's C signature here, so the reader immediately sees: two byte pointers, returns nothing." },
    { t: "INIT_XMM sse2",
      e: "<b>Choosing width and instruction set.</b> \"This function works with xmm registers (128 bits = batches of 16 bytes), using instructions from the sse2 set\" — paddb comes from there. Remember asking why we grab 16 bytes at a time? This is where that's decided: change the line to INIT_YMM avx2 — and the very same m0 code rides a 32-byte window." },
    { t: "cglobal add_values, 2, 2, 2, src, src2",
      e: "<b>The key line: declaring a C function.</b> After it, C code can call add_values(src, src2) like a normal function. The numbers and names — click the tokens below, each one is explained.", chips: true },
    { t: "    movu  m0, [srcq]",
      e: "<b>LOAD — you already saw this in part 1.</b> Brackets = dereference: \"go to the address in srcq, take 16 bytes → into m0\". This is *src from C. The srcq register comes from the name \"src\" in cglobal + the \"q\" suffix: the pointer itself is 64-bit, but we're loading 128 bits of data." },
    { t: "    movu  m1, [src2q]",
      e: "<b>Second LOAD.</b> 16 bytes at address src2q → into m1. Both vector registers are now loaded. movu = movdqu, \"move double quad unaligned\" — lesson 2 explains \"unaligned\" (alignment)." },
    { t: "" },
    { t: "    paddb m0, m1",
      e: "<b>The addition — the heart of the function.</b> p-add-b: \"p\" = packed (a vector instruction, not scalar), \"b\" = bytes. 16 additions in one instruction — you saw it in motion in part 1. m0 = m0 + m1, elementwise." },
    { t: "" },
    { t: "    movu  [srcq], m0",
      e: "<b>STORE.</b> The operands swapped places: brackets are now on the left → we write to memory. 16 result bytes from m0 → to address srcq, right over the original src data." },
    { t: "" },
    { t: "    RET",
      e: "<b>Return.</b> A macro from x86inc (not the bare ret instruction — the macro also cleans up after itself when needed). Note: the function returns nothing. The result already sits in memory behind the src pointer — the style of almost every FFmpeg asm function: mutate data at an address instead of returning a value." }
  ];
  var CHIPS = [
    { t: "cglobal", l: "macro", e: "<b>cglobal</b> — an x86inc macro: declares a function visible from C code. It handles all the calling-convention chores for you (where arguments live on each OS — Linux, Windows, macOS pass them differently; no longer your problem)." },
    { t: "add_values", l: "name", e: "<b>add_values</b> — the function name. Called from C as usual: add_values(src, src2)." },
    { t: "2", l: "arguments", e: "<b>First 2: arguments = 2.</b> How many parameters the function takes (src and src2). x86inc fetches them itself — from registers or the stack, depending on the OS — and puts them into r0, r1." },
    { t: "2", l: "GPRs", e: "<b>Second 2: GPRs = 2.</b> How many general-purpose registers the function needs in total, arguments included. If you needed a loop counter like r1q in part 1, you'd write 3." },
    { t: "2", l: "XMM", e: "<b>Third 2: XMM = 2.</b> How many vector registers we use — m0 and m1. x86inc needs to know up front (on Windows some xmm registers must be preserved — it does that for you)." },
    { t: "src, src2", l: "arg names", e: "<b>Argument names.</b> They give birth to the srcq and src2q you see below in the code. Reads a hundred times better than faceless r0q/r1q. Older FFmpeg code has no names — it accesses r0, r1 directly." }
  ];

  var code = $("f_code");
  LINES.forEach(function (l, i) {
    var s = document.createElement("span");
    s.className = "ln" + (l.e ? " clickable" : "");
    s.id = "f_ln" + i;
    s.textContent = l.t === "" ? " " : l.t;
    if (l.e) {
      s.setAttribute("tabindex", "0");
      s.setAttribute("role", "button");
      var pick = function (idx) { return function (ev) {
        if (ev.type === "keydown" && ev.key !== "Enter" && ev.key !== " ") return;
        ev.preventDefault(); select(idx);
      }; }(i);
      s.addEventListener("click", pick);
      s.addEventListener("keydown", pick);
    }
    code.appendChild(s);
  });

  var chipsEl = $("f_chips");
  CHIPS.forEach(function (c, i) {
    var b = document.createElement("button");
    b.className = "chip"; b.id = "f_chip" + i;
    b.innerHTML = c.t + "<small>" + c.l + "</small>";
    b.addEventListener("click", function () { selectChip(i); });
    chipsEl.appendChild(b);
  });

  function select(i) {
    LINES.forEach(function (l, j) {
      var el = $("f_ln" + j);
      el.className = "ln" + (l.e ? " clickable" : "") + (j === i ? " sel" : "");
    });
    chipsEl.hidden = !LINES[i].chips;
    CHIPS.forEach(function (c, j) { $("f_chip" + j).className = "chip"; });
    $("f_expl").innerHTML = LINES[i].e;
  }
  function selectChip(i) {
    CHIPS.forEach(function (c, j) { $("f_chip" + j).className = "chip" + (j === i ? " sel" : ""); });
    $("f_expl").innerHTML = CHIPS[i].e;
  }
  select(0);
})();
</script>
